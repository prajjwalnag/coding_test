name: Evaluate PR Submission

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Forks only get read-only token on pull_request — that is intentional.
# Writing the PR comment is handled by the separate post-evaluation-comment workflow.
permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout & toolchain setup ─────────────────────────────────────────

      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Save PR metadata for the downstream workflow ───────────────────────

      - name: Save PR number
        run: echo "${{ github.event.pull_request.number }}" > pr_number.txt

      # ── Backend preparation ────────────────────────────────────────────────

      - name: Install backend Python dependencies
        run: pip install -r backend/requirements.txt

      # ── Frontend preparation ───────────────────────────────────────────────

      - name: Install frontend Node dependencies
        working-directory: frontend
        run: npm ci

      # ── Run evaluator ──────────────────────────────────────────────────────

      - name: Run evaluation script
        run: python scripts/evaluate_pr.py

      # ── Upload artifact for the comment-posting workflow ──────────────────

      - name: Upload evaluation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: |
            evaluation_results.json
            evaluation_comment.md
            pr_number.txt
          retention-days: 7
