name: Post Evaluation Comment

# Triggers only after the "Evaluate PR Submission" workflow finishes.
# This job runs in the context of the BASE repo and therefore holds a
# GITHUB_TOKEN with pull-requests:write — safe because we never execute
# the fork's code here.
on:
  workflow_run:
    workflows: ["Evaluate PR Submission"]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    # Post comment whether evaluation passed or failed
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}

    steps:
      - name: Download evaluation artifact
        uses: actions/download-artifact@v4.1.9
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: evaluation-results
          path: artifact

      - name: Read PR number
        id: pr
        run: echo "number=$(cat artifact/pr_number.txt)" >> "$GITHUB_OUTPUT"

      - name: Post score comment to PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt(process.env.PR_NUMBER, 10);

            let body;
            try {
              body = fs.readFileSync('artifact/evaluation_comment.md', 'utf8');
            } catch (e) {
              body = `⚠️ Evaluation script did not produce a report. Check the [workflow logs](${process.env.WORKFLOW_URL}) for details.`;
            }

            // Find and delete any previous bot comment so the PR doesn't accumulate stale reports
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Automated Evaluation Report')
            );
            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            core.info(`Evaluation comment posted to PR #${prNumber}`);
